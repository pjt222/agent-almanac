name: Validate Tests
on:
  push:
    branches: [main]
    # agents/teams/skills are included because the target-existence step below
    # validates tests/scenarios targets against those trees — a PR deleting or
    # renaming a target must re-run this check (#362).
    paths: ['tests/**', 'agents/**', 'teams/**', 'skills/**']
  pull_request:
    paths: ['tests/**', 'agents/**', 'teams/**', 'skills/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate test scenario frontmatter
        run: |
          # globstar: without it, ** degrades to one directory level while the
          # registry-count step uses `find` (all depths) — a nested scenario
          # would be counted but skip validation (#362).
          shopt -s globstar nullglob
          failed=0
          required_fields="name test-level target"
          for f in tests/scenarios/**/*.md; do
            [ ! -f "$f" ] && continue
            for field in $required_fields; do
              if ! grep -q "^${field}:" "$f"; then
                echo "FAIL: $f missing required field: $field"
                failed=1
              fi
            done
          done
          exit $failed

      - name: Validate required sections
        run: |
          shopt -s globstar nullglob
          failed=0
          required_sections="Objective Pre-conditions Task Expected.Behaviors Acceptance.Criteria Observation.Protocol"
          for f in tests/scenarios/**/*.md; do
            [ ! -f "$f" ] && continue
            for section in $required_sections; do
              pattern=$(echo "$section" | tr '.' ' ')
              if ! grep -q "^## ${pattern}" "$f"; then
                echo "FAIL: $f missing required section: ## $pattern"
                failed=1
              fi
            done
          done
          exit $failed

      - name: Verify registry count
        run: |
          disk_count=$(find tests/scenarios -name '*.md' | wc -l)
          reg_count=$(grep 'total_tests:' tests/_registry.yml | tr -d '\r' | awk '{print $2}')
          if [ "$disk_count" != "$reg_count" ]; then
            echo "FAIL: disk=$disk_count registry=$reg_count"
            exit 1
          fi
          echo "OK: $disk_count test scenarios on disk match registry"

      - name: Verify test targets exist
        run: |
          failed=0
          for f in tests/scenarios/teams/*.md; do
            [ ! -f "$f" ] && continue
            target=$(grep '^target:' "$f" | head -1 | tr -d '\r' | awk '{print $2}')
            if [ -n "$target" ]; then
              if [ ! -f "teams/${target}.md" ]; then
                echo "FAIL: $f targets team '${target}' but teams/${target}.md not found"
                failed=1
              fi
            fi
          done
          for f in tests/scenarios/agents/*.md ; do
            [ ! -f "$f" ] && continue
            target=$(grep '^target:' "$f" | head -1 | tr -d '\r' | awk '{print $2}')
            if [ -n "$target" ]; then
              if [ ! -f "agents/${target}.md" ]; then
                echo "FAIL: $f targets agent '${target}' but agents/${target}.md not found"
                failed=1
              fi
            fi
          done
          for f in tests/scenarios/skills/*.md ; do
            [ ! -f "$f" ] && continue
            target=$(grep '^target:' "$f" | head -1 | tr -d '\r' | awk '{print $2}')
            if [ -n "$target" ]; then
              if [ ! -d "skills/${target}" ]; then
                echo "FAIL: $f targets skill '${target}' but skills/${target}/ not found"
                failed=1
              fi
            fi
          done
          for f in tests/scenarios/negative/*.md tests/scenarios/integration/*.md ; do
            [ ! -f "$f" ] && continue
            target=$(grep '^target:' "$f" | head -1 | tr -d '\r' | awk '{print $2}')
            level=$(grep '^test-level:' "$f" | head -1 | tr -d '\r' | awk '{print $2}')
            if [ -n "$target" ]; then
              case "$level" in
                team) [ ! -f "teams/${target}.md" ] && echo "FAIL: $f targets team '${target}' not found" && failed=1 ;;
                agent) [ ! -f "agents/${target}.md" ] && echo "FAIL: $f targets agent '${target}' not found" && failed=1 ;;
                skill) [ ! -d "skills/${target}" ] && echo "FAIL: $f targets skill '${target}' not found" && failed=1 ;;
              esac
            fi
          done
          exit $failed

      - uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Report skill eval coverage (informational)
        # Report-only: coverage is low by design today, so this never fails the build.
        # Surfaces covered/total and the delta; raise a floor with `--min` once coverage climbs (#435).
        run: node scripts/eval-coverage.js
