name: Validate Skills
on:
  push:
    branches: [main]
    paths: ['skills/**', 'i18n/**/skills/**']
  pull_request:
    paths: ['skills/**', 'i18n/**/skills/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Pinned to commit SHA for reproducibility — update periodically
      - name: Install skills-ref
        run: |
          pip install "git+https://github.com/agentskills/agentskills.git@752b29a0a1a1#subdirectory=skills-ref"
          skills-ref --version

      - name: Validate all skills
        run: |
          failed=0
          for dir in skills/*/; do
            [ "$(basename "$dir")" = "_template" ] && continue
            if [ -f "$dir/SKILL.md" ]; then
              if ! skills-ref validate "$dir"; then
                failed=1
              fi
            fi
          done
          exit $failed

      - name: Check line counts
        run: |
          failed=0
          for f in skills/*/SKILL.md; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 500 ]; then
              echo "FAIL: $f ($lines lines > 500)"
              failed=1
            fi
          done
          exit $failed

      - name: Verify registry count
        run: |
          disk_count=$(find skills -name SKILL.md -not -path "skills/_template/*" | wc -l)
          reg_count=$(grep 'total_skills:' skills/_registry.yml | tr -d '\r' | awk '{print $2}')
          if [ "$disk_count" != "$reg_count" ]; then
            echo "FAIL: disk=$disk_count registry=$reg_count"
            exit 1
          fi
          echo "OK: $disk_count skills on disk match registry"

      - name: Validate translated skills
        run: |
          # Known accepted overruns — translations whose source-fidelity outweighs
          # the 500-line ceiling. Keep this list short; prefer extracting examples
          # to references/EXAMPLES.md when adding new translations.
          OVERRUN_ALLOWLIST=(
            "i18n/caveman/skills/collect-preserve-specimens/SKILL.md"
            "i18n/caveman-lite/skills/collect-preserve-specimens/SKILL.md"
            "i18n/wenyan-lite/skills/create-2d-composition/SKILL.md"
          )

          is_allowed() {
            local path="$1"
            for allowed in "${OVERRUN_ALLOWLIST[@]}"; do
              [ "$path" = "$allowed" ] && return 0
            done
            return 1
          }

          failed=0
          for locale_dir in i18n/*/skills/; do
            [ ! -d "$locale_dir" ] && continue
            locale=$(basename "$(dirname "$locale_dir")")
            for dir in "$locale_dir"/*/; do
              [ ! -f "$dir/SKILL.md" ] && continue
              skill_path="${dir%/}/SKILL.md"
              skill_path="${skill_path//\/\//\/}"
              if ! grep -q "locale: $locale" "$skill_path"; then
                echo "FAIL: $skill_path missing locale: $locale"
                failed=1
              fi
              lines=$(wc -l < "$skill_path")
              if [ "$lines" -gt 500 ]; then
                if is_allowed "$skill_path"; then
                  echo "WARN (allowlisted): $skill_path ($lines lines > 500)"
                else
                  echo "FAIL: $skill_path ($lines > 500)"
                  failed=1
                fi
              fi
            done
          done
          exit $failed

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Check translation freshness (warn only)
        run: node scripts/check-translation-freshness.js --warn
