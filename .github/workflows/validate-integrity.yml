name: Validate Integrity
on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - 'teams/**'
      - 'guides/**'
      - 'skills/**'
      - 'scripts/**'
      - '.claude/**'
      - 'viz/R/glyphs.R'
      - 'viz/R/agent_glyphs.R'
      - 'viz/R/palettes.R'
      - 'viz/domain-styles.yml'
      - 'viz/agent-styles.yml'
      - 'viz/team-styles.yml'
      - 'viz/build-icon-manifest.js'
  pull_request:
    paths:
      - 'agents/**'
      - 'teams/**'
      - 'guides/**'
      - 'skills/**'
      - 'scripts/**'
      - '.claude/**'
      - 'viz/R/glyphs.R'
      - 'viz/R/agent_glyphs.R'
      - 'viz/R/palettes.R'
      - 'viz/domain-styles.yml'
      - 'viz/agent-styles.yml'
      - 'viz/team-styles.yml'
      - 'viz/build-icon-manifest.js'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run integrity checks
        run: bash scripts/validate-integrity.sh
